<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Central de Resultados</title>
    <meta name="description" content="Resultados financeiros, apresentações e relatórios." />
    <link rel="stylesheet" href="/styles/main.scss" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  </head>
  <body>
    <div id="site-topbar"></div>
    <header id="site-header"></header>

    <main>
      <section class="page-header" aria-labelledby="page-title">
        <img class="page-header__bg"
             src="/assets/img/header-interno/header-interno.jpg"
             alt="" aria-hidden="true" />
        <div class="page-header__overlay" aria-hidden="true"></div>
        <div class="page-header__inner">
          <ol class="page-header__breadcrumb" aria-label="Você está em">
            <li><a href="/">Home</a></li>
            <li>Investidores</li>
            <li aria-current="page">Central de Resultados</li>
          </ol>
          <h1 id="page-title" class="page-header__title">Central de Resultados</h1>
          <p class="page-header__lede">Resultados financeiros, apresentações e relatórios.</p>
        </div>
      </section>

      <section class="page-section" aria-labelledby="resultados-title">
        <div class="page-section__container">

          <div class="filter-bar">
            <h2 id="resultados-title" class="results-table__section-title">Resultados</h2>
            <div class="filter-bar__group">
              <span class="filter-bar__label">Filtrar por:</span>
              <div class="select results-select">
                <select aria-label="Ano" id="filter-ano"></select>
              </div>
            </div>
          </div>

          <!-- empresa-tabs — gerado dinamicamente por empresa-tabs.js -->
          <div data-empresa-section data-empresa-group="resultados">

            <!-- Template clonado por empresa -->
            <template data-empresa-panel-template>
              <div data-empresa-panel>
                <div class="data-table-wrap" data-results-table>
                  <!-- Tabela gerada em runtime por central-resultados.js -->
                  <p class="page-empty" style="padding:2rem 0;color:var(--color-text-muted);text-align:center">
                    Nenhum resultado publicado ainda.
                  </p>
                </div>
              </div>
            </template>

          </div><!-- /data-empresa-section -->

        </div>
      </section>
    </main>

    <footer id="site-footer"></footer>

    <div class="search-overlay" id="search-overlay" aria-hidden="true" aria-label="Busca" role="dialog">
      <div class="search-overlay__inner">
        <div class="search-overlay__box">
          <svg class="search-overlay__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="search-overlay__input" type="search" placeholder="O que você está procurando?" aria-label="Campo de busca" data-search-input />
          <button class="search-overlay__close" type="button" aria-label="Fechar busca" data-search-close>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <p class="search-overlay__hint">Pressione <kbd>ESC</kbd> para fechar</p>
      </div>
    </div>

    <script type="module">
      // Popula filtro de anos dinamicamente
      const yearSelect = document.getElementById('filter-ano');
      const currentYear = new Date().getFullYear();
      for (let y = currentYear; y >= currentYear - 4; y--) {
        const opt = document.createElement('option');
        opt.value = y;
        opt.textContent = y;
        yearSelect.appendChild(opt);
      }
    </script>
    <script type="module" src="/scripts/page.js"></script>
  </body>
</html>
