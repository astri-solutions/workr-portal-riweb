<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home — Workr Lite RI</title>
    <meta name="description" content="Relações com Investidores — Transparência e acesso às informações da companhia." />
    <link rel="stylesheet" href="/styles/main.scss" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  </head>
  <body>
    <div id="site-topbar"></div>
    <header id="site-header" data-hide-nav data-navbar-variant="navbar-blur"></header>

    <main>

      <!-- ── Carousel Banner — rendered by carousel.js from siteConfig ──────── -->
      <div class="carousel" id="home-carousel" data-slides="v2" aria-label="Banner principal">
      </div>

      <!-- ── Tab Menu Section — nav + panels populated by tab-menu.js ──────── -->
      <section class="page-section" aria-label="Conteúdo RI">
        <div class="page-section__container">

          <nav class="tab-menu__nav" data-tab-nav="home-tabs" aria-label="Seções de conteúdo">
            <!-- populated by tab-menu.js from siteConfig.nav -->
          </nav>

          <div class="tab-menu__panels">
            <!-- populated by tab-menu.js — each panel starts as .page-empty -->
          </div>

        </div>
      </section>

    </main>

    <footer id="site-footer"></footer>

    <div class="search-overlay" id="search-overlay" aria-hidden="true" aria-label="Busca" role="dialog">
      <div class="search-overlay__inner">
        <div class="search-overlay__box">
          <svg class="search-overlay__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="search-overlay__input" type="search" placeholder="O que você está procurando?" aria-label="Campo de busca" data-search-input />
          <button class="search-overlay__close" type="button" aria-label="Fechar busca" data-search-close>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <p class="search-overlay__hint">Pressione <kbd>ESC</kbd> para fechar</p>
      </div>
    </div>

    <script type="module" src="/scripts/page.js"></script>
    <script type="module" src="/scripts/carousel.js"></script>
    <script type="module" src="/scripts/tab-menu.js"></script>
  </body>
</html>
